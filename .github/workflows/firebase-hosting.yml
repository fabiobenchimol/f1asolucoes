name: Deploy F1A

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate firebase.json
        run: |
          test -f firebase.json

      - name: Deploy F1A
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.F1A_FIREBASE_SERVICE_ACCOUNT }}"
          projectId: projeto-ceocard
          target: sitef1a
          channelId: live