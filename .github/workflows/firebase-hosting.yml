name: Deploy F1A

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Service Account
        shell: bash
        run: |
          cat > service-account.json <<EOF
          ${{ secrets.F1A_FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Validate JSON
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          jq . service-account.json

      - name: Show Service Account (without private key)
        run: |
          jq 'del(.private_key)' service-account.json

      - name: Configure Credentials
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/service-account.json" >> $GITHUB_ENV

      - name: Firebase Version
        run: firebase --version

      - name: Test Firebase Authentication
        run: firebase projects:list

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Google Cloud
        run: |
          gcloud auth activate-service-account \
            --key-file=service-account.json

      - name: Active Account
        run: gcloud auth list

      - name: Validate firebase.json
        run: test -f firebase.json

      - name: Deploy Hosting
        run: |
          firebase deploy \
            --project projeto-ceocard \
            --only hosting:sitef1a \
            --non-interactive \
            --debug