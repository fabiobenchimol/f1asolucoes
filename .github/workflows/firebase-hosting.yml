name: Deploy F1A

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create Firebase Key
        run: |
          echo '${{ secrets.F1A_FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Firebase CLI
        run: firebase --version

      - name: Verify Authentication
        run: |
          firebase projects:list

      - name: Deploy Hosting
        run: |
          firebase deploy \
            --project projeto-ceocard \
            --only hosting:sitef1a \
            --non-interactive