name: Deploy F1A

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Autenticação oficial do Google
      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.F1A_FIREBASE_SERVICE_ACCOUNT }}'

      # Apenas para facilitar depuração (pode remover depois)
      - name: Firebase Information
        run: |
          firebase --version
          firebase projects:list || true

      - name: Validate firebase.json
        run: |
          test -f firebase.json

      - name: Deploy F1A
        run: |
          firebase deploy \
            --project projeto-ceocard \
            --only hosting:sitef1a