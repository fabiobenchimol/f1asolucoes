name: Deploy F1A

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.F1A_FIREBASE_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firebase Version
        run: firebase --version

      - name: Deploy Hosting
        run: |
          firebase deploy \
            --project projeto-ceocard \
            --only hosting:sitef1a \
            --non-interactive