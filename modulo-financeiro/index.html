<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1A - Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="../lobby.html" class="logo-link">
                <span class="material-symbols-rounded">arrow_back</span>
                <img src="../assets/logo_f1a.png" alt="F1A Logo" class="logo">
            </a>
            <span class="nav-title">Módulo Financeiro</span>
        </div>
        <div class="nav-user" id="user-info">
            </div>
    </nav>

    <main class="container">
        <section class="kpi-grid">
            <div class="card">
                <h3>Vendas Totais</h3>
                <p id="total-vendas">Carregando...</p>
            </div>
            <div class="card">
                <h3>Inadimplência</h3>
                <p id="inadimplencia" class="text-copper">Carregando...</p>
            </div>
            <div class="card">
                <h3>A Receber</h3>
                <p id="a-receber">Carregando...</p>
            </div>
            <div class="card">
                <h3>Juros/Multas</h3>
                <p id="juros-total">Carregando...</p>
            </div>
        </section>

        <section class="report-section">
            <div class="report-header">
                <h2>Relatório de Repasse para Lojistas</h2>
                <button onclick="window.print()" class="btn-print">
                    <span class="material-symbols-rounded">print</span> Imprimir
                </button>
            </div>
            <table id="tabela-financeira">
                <thead>
                    <tr>
                        <th>Loja</th>
                        <th>Venda Bruta</th>
                        <th>Encargos</th>
                        <th>Líquido Repasse</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lista-financeira">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
